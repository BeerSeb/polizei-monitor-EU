<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DE Polizei Monitor</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg: #0a0c10; --surface: #111318; --border: #1e2330;
      --accent: #00e5ff; --accent2: #ff3b5c; --accent3: #f5a623;
      --text: #d0d8e8; --muted: #4a5568;
      --mono: 'IBM Plex Mono', monospace; --sans: 'IBM Plex Sans', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body { background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 14px; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

    header { display: flex; align-items: center; justify-content: space-between; padding: 10px 20px; border-bottom: 1px solid var(--border); background: var(--surface); flex-shrink: 0; gap: 12px; flex-wrap: wrap; }
    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-icon { width: 30px; height: 30px; background: var(--accent); clip-path: polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: var(--bg); font-family: var(--mono); }
    .logo h1 { font-family: var(--mono); font-size: 12px; font-weight: 600; letter-spacing: .08em; color: var(--accent); line-height: 1.2; }
    .logo span { font-size: 10px; color: var(--muted); letter-spacing: .06em; }
    .header-stats { display: flex; gap: 20px; align-items: center; }
    .stat-val { font-family: var(--mono); font-size: 17px; font-weight: 600; color: var(--accent); line-height: 1; }
    .stat-lbl { font-size: 9px; letter-spacing: .1em; color: var(--muted); text-transform: uppercase; margin-top: 2px; }
    .last-update { font-family: var(--mono); font-size: 10px; color: var(--muted); }

    .toolbar { display: flex; gap: 8px; padding: 8px 14px; background: var(--surface); border-bottom: 1px solid var(--border); flex-wrap: wrap; align-items: center; flex-shrink: 0; }
    .search-wrap { position: relative; flex: 1; min-width: 160px; max-width: 300px; }
    .search-wrap svg { position: absolute; left: 8px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; }
    input[type=text], select { background: var(--bg); border: 1px solid var(--border); color: var(--text); font-family: var(--mono); font-size: 12px; padding: 6px 8px 6px 28px; border-radius: 4px; outline: none; width: 100%; transition: border-color .2s; }
    input[type=text]:focus, select:focus { border-color: var(--accent); }
    select { padding-left: 8px; cursor: pointer; }
    .pills { display: flex; gap: 5px; flex-wrap: wrap; }
    .pill { font-family: var(--mono); font-size: 10px; padding: 4px 9px; border-radius: 3px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; transition: all .15s; white-space: nowrap; }
    .pill:hover { border-color: var(--accent); color: var(--accent); }
    .pill.active { background: var(--accent); border-color: var(--accent); color: var(--bg); font-weight: 600; }
    .btn { font-family: var(--mono); font-size: 11px; padding: 6px 12px; border-radius: 4px; border: 1px solid var(--border); background: transparent; color: var(--text); cursor: pointer; white-space: nowrap; transition: all .15s; display: flex; align-items: center; gap: 5px; }
    .btn:hover { border-color: var(--accent3); color: var(--accent3); }
    .btn-accent { border-color: var(--accent); color: var(--accent); }
    .btn-accent:hover { background: var(--accent); color: var(--bg); }
    .btn-route { border-color: var(--accent3); color: var(--accent3); }
    .btn-route:hover { background: var(--accent3); color: var(--bg); }
    .btn-danger { border-color: var(--accent2); color: var(--accent2); }
    .btn-danger:hover { background: var(--accent2); color: #fff; }
    .vtbtn { font-family: var(--mono); font-size: 10px; padding: 4px 9px; border-radius: 3px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; transition: all .15s; }
    .vtbtn.active { border-color: var(--accent); color: var(--accent); background: rgba(0,229,255,.08); }

    /* ROUTE PANEL */
    .route-panel { background: #0e1118; border-bottom: 2px solid var(--accent3); padding: 10px 16px; display: none; flex-shrink: 0; }
    .route-panel.open { display: block; }
    .route-panel-inner { display: flex; gap: 10px; align-items: flex-end; flex-wrap: wrap; }
    .route-field { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 140px; }
    .route-field label { font-family: var(--mono); font-size: 9px; letter-spacing: .1em; color: var(--accent3); text-transform: uppercase; }
    .route-field input { padding-left: 8px; }
    .slider-wrap { display: flex; flex-direction: column; gap: 4px; }
    .slider-wrap label { font-family: var(--mono); font-size: 9px; letter-spacing: .1em; color: var(--accent3); text-transform: uppercase; }
    .slider-row { display: flex; align-items: center; gap: 8px; }
    input[type=range] { accent-color: var(--accent3); width: 110px; cursor: pointer; }
    .slider-val { font-family: var(--mono); font-size: 11px; color: var(--accent3); min-width: 38px; }
    .route-info { font-family: var(--mono); font-size: 10px; color: var(--muted); margin-top: 7px; }
    .route-info span { color: var(--accent3); }
    .route-spinner { display: none; font-family: var(--mono); font-size: 10px; color: var(--accent3); align-self: center; }
    .route-spinner.show { display: inline; }

    .main { display: flex; flex: 1; overflow: hidden; min-height: 0; }
    #map { flex: 1; min-width: 0; }

    .sidebar { width: 360px; flex-shrink: 0; display: flex; flex-direction: column; border-left: 1px solid var(--border); background: var(--surface); overflow: hidden; }
    .sidebar-header { padding: 10px 14px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .sidebar-title { font-family: var(--mono); font-size: 11px; letter-spacing: .1em; color: var(--muted); text-transform: uppercase; }
    .count-badge { font-family: var(--mono); font-size: 11px; background: var(--accent); color: var(--bg); padding: 2px 7px; border-radius: 10px; font-weight: 600; }
    .count-badge.route-mode { background: var(--accent3); }
    .incident-list { flex: 1; overflow-y: auto; padding: 6px; }
    .incident-list::-webkit-scrollbar { width: 3px; }
    .incident-list::-webkit-scrollbar-thumb { background: var(--border); }

    .incident-card { border: 1px solid var(--border); border-radius: 5px; padding: 9px 11px; margin-bottom: 5px; cursor: pointer; transition: all .15s; position: relative; }
    .incident-card:hover { border-color: var(--accent); background: rgba(0,229,255,.04); }
    .incident-card.active { border-color: var(--accent); background: rgba(0,229,255,.07); }
    .incident-card.route-hl { border-color: var(--accent3) !important; }
    .incident-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; border-radius: 5px 0 0 5px; background: var(--cat-color, var(--muted)); }
    .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 3px; }
    .card-cat { font-family: var(--mono); font-size: 9px; letter-spacing: .1em; text-transform: uppercase; color: var(--cat-color, var(--muted)); font-weight: 600; }
    .card-date { font-family: var(--mono); font-size: 9px; color: var(--muted); }
    .card-title { font-size: 12px; font-weight: 600; color: var(--text); margin-bottom: 2px; line-height: 1.3; }
    .card-loc { font-family: var(--mono); font-size: 10px; color: var(--muted); }
    .card-src { font-size: 9px; color: var(--muted); margin-top: 3px; opacity: .6; }
    .route-dist { font-family: var(--mono); font-size: 9px; color: var(--accent3); margin-top: 2px; }

    .detail-panel { border-top: 1px solid var(--border); padding: 12px 14px; display: none; max-height: 230px; overflow-y: auto; }
    .detail-panel.open { display: block; }
    .detail-panel::-webkit-scrollbar { width: 3px; }
    .detail-panel::-webkit-scrollbar-thumb { background: var(--border); }
    .dp-title { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 6px; line-height: 1.4; padding-left: 8px; }
    .dp-meta { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 8px; }
    .dp-meta span { font-family: var(--mono); font-size: 10px; color: var(--muted); }
    .dp-text { font-size: 12px; line-height: 1.6; color: var(--text); opacity: .85; }
    .dp-link { display: inline-block; margin-top: 8px; font-family: var(--mono); font-size: 10px; color: var(--accent); text-decoration: none; border-bottom: 1px solid rgba(0,229,255,.3); }
    .dp-close { float: right; background: none; border: none; color: var(--muted); cursor: pointer; font-size: 14px; }
    .dp-close:hover { color: var(--accent2); }

    .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 180px; color: var(--muted); gap: 8px; }
    .empty-state p { font-family: var(--mono); font-size: 11px; }

    .loading-overlay { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; gap: 14px; }
    .loading-overlay.hidden { display: none; }
    .loader-hex { width: 44px; height: 44px; background: var(--accent); clip-path: polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%); animation: pulse 1.2s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1);}50%{opacity:.4;transform:scale(.8);} }
    .loading-text { font-family: var(--mono); font-size: 12px; color: var(--muted); letter-spacing: .1em; }

    .leaflet-popup-content-wrapper { background: var(--surface) !important; color: var(--text) !important; border: 1px solid var(--border) !important; border-radius: 6px !important; box-shadow: 0 4px 20px rgba(0,0,0,.7) !important; font-family: var(--sans) !important; }
    .leaflet-popup-tip { background: var(--surface) !important; }
    .leaflet-popup-content { margin: 10px 12px !important; }
    .popup-cat { font-family: var(--mono); font-size: 9px; letter-spacing: .1em; text-transform: uppercase; color: var(--accent); margin-bottom: 3px; }
    .popup-title { font-size: 12px; font-weight: 600; margin-bottom: 3px; }
    .popup-loc { font-family: var(--mono); font-size: 10px; color: var(--muted); }
    .leaflet-control-zoom a { background: var(--surface) !important; color: var(--text) !important; border-color: var(--border) !important; }
    .leaflet-control-zoom a:hover { color: var(--accent) !important; }
    .leaflet-container { background: #0d1117 !important; }

    @media (max-width: 700px) {
      .sidebar { width: 100%; height: 40vh; }
      .main { flex-direction: column-reverse; }
    }
  </style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="loader-hex"></div>
  <div class="loading-text">LADE VORFALLSDATEN…</div>
</div>

<header>
  <div class="logo">
    <div class="logo-icon">DE</div>
    <div>
      <h1>POLIZEI OSINT MONITOR</h1>
      <span>DEUTSCHLAND · ALLE BUNDESLÄNDER · BUNDESPOLIZEI</span>
    </div>
  </div>
  <div class="header-stats">
    <div class="stat"><div class="stat-val" id="statTotal">—</div><div class="stat-lbl">Vorfälle</div></div>
    <div class="stat"><div class="stat-val" id="statGeo">—</div><div class="stat-lbl">Georef.</div></div>
    <div class="stat"><div class="stat-val" id="statSources">—</div><div class="stat-lbl">Quellen</div></div>
    <div class="stat"><div class="stat-val" id="statToday">—</div><div class="stat-lbl">Heute</div></div>
  </div>
  <div class="last-update" id="lastUpdate">—</div>
</header>

<div class="toolbar">
  <div class="search-wrap">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" id="searchInput" placeholder="Ort, Stichwort, Bundesland …" />
  </div>
  <select id="countryFilter">
    <option value="">Alle Länder</option>
    <option>Deutschland</option>
    <option>Österreich</option>
    <option>Schweiz</option>
    <option>Niederlande</option>
    <option>Vereinigtes Königreich</option>
    <option>Frankreich</option>
    <option>Belgien</option>
    <option>Spanien</option>
    <option>Italien</option>
    <option>Tschechien</option>
    <option>Polen</option>
    <option>Europa</option>
  </select>
  <select id="bundeslandFilter">
    <option value="">Alle Regionen</option>
    <option>Bayern</option><option>Berlin</option><option>Baden-Württemberg</option>
    <option>Brandenburg</option><option>Bremen</option><option>Hamburg</option>
    <option>Hessen</option><option>Mecklenburg-Vorpommern</option><option>Niedersachsen</option>
    <option>NRW</option><option>Rheinland-Pfalz</option><option>Saarland</option>
    <option>Sachsen</option><option>Sachsen-Anhalt</option><option>Schleswig-Holstein</option>
    <option>Thüringen</option><option>Bundespolizei</option>
    <option>Wien</option><option>Zürich</option><option>Bern</option><option>Basel</option>
    <option>Metropolitan Police</option><option>West Yorkshire Police</option>
    <option>Greater Manchester</option>
  </select>
  <select id="zeitFilter">
    <option value="">Alle</option>
    <option value="1">Heute</option>
    <option value="3">3 Tage</option>
    <option value="7">7 Tage</option>
    <option value="30">30 Tage</option>
  </select>
  <div class="pills" id="catPills"></div>
  <div style="display:flex;gap:4px">
    <button class="vtbtn active" id="btnHeat" onclick="setView('heat')">HEAT</button>
    <button class="vtbtn" id="btnDots" onclick="setView('dots')">PUNKTE</button>
  </div>
  <button class="btn btn-route" onclick="toggleRoutePanel()">🗺 ROUTE</button>
  <button class="btn btn-accent" onclick="exportExcel()">↓ EXCEL</button>
</div>

<!-- ROUTE / STANDORT PANEL -->
<div class="route-panel" id="routePanel">
  <!-- MODE TABS -->
  <div style="display:flex;gap:6px;margin-bottom:10px">
    <button class="vtbtn active" id="tabRoute" onclick="setMode('route')">🗺 ROUTE A → B</button>
    <button class="vtbtn" id="tabStandort" onclick="setMode('standort')">📍 EINZELNER STANDORT</button>
  </div>

  <!-- ROUTE MODE -->
  <div id="modeRoute">
    <div class="route-panel-inner">
      <div class="route-field">
        <label>Start</label>
        <input type="text" id="routeStart" placeholder="z.B. München" />
      </div>
      <div class="route-field">
        <label>Ziel</label>
        <input type="text" id="routeEnd" placeholder="z.B. Berlin" />
      </div>
      <div class="slider-wrap">
        <label>Puffer um Route</label>
        <div class="slider-row">
          <input type="range" id="bufferSlider" min="1" max="50" value="10" />
          <span class="slider-val" id="sliderVal">10 km</span>
        </div>
      </div>
      <button class="btn btn-route" onclick="calcRoute()">BERECHNEN</button>
      <button class="btn btn-danger" onclick="clearRoute()">✕ LÖSCHEN</button>
      <span class="route-spinner" id="routeSpinner">⟳ Berechne…</span>
    </div>
  </div>

  <!-- STANDORT MODE -->
  <div id="modeStandort" style="display:none">
    <div class="route-panel-inner">
      <div class="route-field">
        <label>Standort</label>
        <input type="text" id="standortInput" placeholder="z.B. Paris, Köln, Amsterdam …" />
      </div>
      <div class="slider-wrap">
        <label>Radius</label>
        <div class="slider-row">
          <input type="range" id="radiusSlider" min="1" max="100" value="25" />
          <span class="slider-val" id="radiusVal">25 km</span>
        </div>
      </div>
      <button class="btn btn-route" onclick="calcStandort()">SUCHEN</button>
      <button class="btn btn-danger" onclick="clearRoute()">✕ LÖSCHEN</button>
      <span class="route-spinner" id="standortSpinner">⟳ Suche…</span>
    </div>
  </div>

  <div class="route-info" id="routeInfo"></div>
</div>

<div class="main">
  <div id="map"></div>
  <div class="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-title" id="sidebarTitle">VORFÄLLE</span>
      <span class="count-badge" id="sidebarCount">0</span>
    </div>
    <div class="incident-list" id="incidentList"></div>
    <div class="detail-panel" id="detailPanel">
      <button class="dp-close" onclick="closeDetail()">✕</button>
      <div id="detailContent"></div>
    </div>
  </div>
</div>

<script>
const CAT_COLORS = {
  'Unfall':'#f5a623','Einbruch':'#ff3b5c','Diebstahl':'#9b59b6',
  'Körperverletzung':'#e74c3c','Betrug':'#3498db','Drogen':'#1abc9c',
  'Verkehr':'#f39c12','Vermisstenfall':'#00e5ff','Brand':'#e67e22','Sonstiges':'#4a5568'
};

let allData=[], filtered=[], currentView='heat', selectedCard=null;
let heatLayer=null, dotsGroup=null, routeLayer=null;
let routeIncidents=[], isRouteMode=false;
let map;
const activeFilters={search:'',country:'',bundesland:'',tage:'',cats:new Set()};
let currentMode = 'route'; // 'route' | 'standort'
let standortMarker = null, standortCircle = null;

// ── MAP INIT ──
function initMap(){
  map = L.map('map', { zoomControl: true }).setView([51.2, 10.4], 6);
  // Standard OSM tiles (funktioniert immer, kein API-Key)
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
    attribution: '© <a href="https://openstreetmap.org/copyright">OpenStreetMap</a>'
  }).addTo(map);
  dotsGroup = L.layerGroup().addTo(map);
}

// ── DATA ──
let isDemoData = false;

async function loadData(){
  try {
    const res = await fetch('data/incidents.json');
    if(!res.ok) throw new Error('HTTP '+res.status);
    const json = await res.json();
    if(!Array.isArray(json) || json.length===0) throw new Error('Leer');
    allData = json;
    isDemoData = false;
  } catch(e) {
    console.warn('Echte Daten nicht verfügbar ('+e.message+'), zeige Demo-Daten');
    allData = generateDemoData();
    isDemoData = true;
  }
  document.getElementById('loadingOverlay').classList.add('hidden');
  if(isDemoData){
    const banner = document.createElement('div');
    banner.style.cssText='background:#f5a62322;border-bottom:1px solid #f5a623;padding:5px 16px;font-family:var(--mono);font-size:10px;color:#f5a623;letter-spacing:.08em;flex-shrink:0;';
    banner.textContent='⚠ DEMO-MODUS – keine echten Daten geladen. Bitte Scraper ausführen (GitHub Actions → Run workflow).';
    document.querySelector('.main').before(banner);
  }
  initCatPills();
  updateStats();
  applyFilters();
}

// ── DEMO DATA (alle Länder) ──
function generateDemoData(){
  const cats = Object.keys(CAT_COLORS);
  const locs = [
    // Deutschland
    {n:'München',lat:48.1351,lng:11.5820,land:'Bayern',country:'Deutschland'},
    {n:'Berlin',lat:52.5200,lng:13.4050,land:'Berlin',country:'Deutschland'},
    {n:'Hamburg',lat:53.5753,lng:10.0153,land:'Hamburg',country:'Deutschland'},
    {n:'Köln',lat:50.9333,lng:6.9500,land:'NRW',country:'Deutschland'},
    {n:'Frankfurt',lat:50.1109,lng:8.6821,land:'Hessen',country:'Deutschland'},
    // Österreich
    {n:'Wien',lat:48.2082,lng:16.3738,land:'Wien',country:'Österreich'},
    {n:'Graz',lat:47.0707,lng:15.4395,land:'Steiermark',country:'Österreich'},
    {n:'Salzburg',lat:47.8095,lng:13.0550,land:'Salzburg',country:'Österreich'},
    // Schweiz
    {n:'Zürich',lat:47.3769,lng:8.5417,land:'Zürich',country:'Schweiz'},
    {n:'Bern',lat:46.9481,lng:7.4474,land:'Bern',country:'Schweiz'},
    {n:'Basel',lat:47.5596,lng:7.5886,land:'Basel',country:'Schweiz'},
    // Niederlande
    {n:'Amsterdam',lat:52.3676,lng:4.9041,land:'Noord-Holland',country:'Niederlande'},
    {n:'Rotterdam',lat:51.9244,lng:4.4777,land:'Zuid-Holland',country:'Niederlande'},
    {n:'Den Haag',lat:52.0705,lng:4.3007,land:'Zuid-Holland',country:'Niederlande'},
    // Frankreich
    {n:'Paris',lat:48.8566,lng:2.3522,land:'Île-de-France',country:'Frankreich'},
    {n:'Lyon',lat:45.7640,lng:4.8357,land:'Auvergne-Rhône-Alpes',country:'Frankreich'},
    {n:'Marseille',lat:43.2965,lng:5.3698,land:'PACA',country:'Frankreich'},
    // Belgien
    {n:'Brüssel',lat:50.8503,lng:4.3517,land:'Bruxelles',country:'Belgien'},
    {n:'Antwerpen',lat:51.2194,lng:4.4025,land:'Antwerpen',country:'Belgien'},
    // Spanien
    {n:'Madrid',lat:40.4168,lng:-3.7038,land:'Comunidad de Madrid',country:'Spanien'},
    {n:'Barcelona',lat:41.3851,lng:2.1734,land:'Cataluña',country:'Spanien'},
    // Italien
    {n:'Rom',lat:41.9028,lng:12.4964,land:'Lazio',country:'Italien'},
    {n:'Mailand',lat:45.4642,lng:9.1900,land:'Lombardia',country:'Italien'},
    // UK
    {n:'London',lat:51.5074,lng:-0.1278,land:'Metropolitan Police',country:'Vereinigtes Königreich'},
    {n:'Manchester',lat:53.4808,lng:-2.2426,land:'Greater Manchester',country:'Vereinigtes Königreich'},
    // Polen
    {n:'Warschau',lat:52.2297,lng:21.0122,land:'Mazowieckie',country:'Polen'},
    {n:'Krakau',lat:50.0647,lng:19.9450,land:'Małopolskie',country:'Polen'},
    // Tschechien
    {n:'Prag',lat:50.0755,lng:14.4378,land:'Praha',country:'Tschechien'},
    {n:'Brünn',lat:49.1951,lng:16.6068,land:'Jihomoravský',country:'Tschechien'},
  ];
  const now = Date.now();
  return Array.from({length:400},(_,i) => {
    const loc = locs[Math.floor(Math.random()*locs.length)];
    const cat = cats[Math.floor(Math.random()*cats.length)];
    const ts  = now - Math.random()*30*86400000;
    return {
      id: 'demo_'+i,
      title: cat+' in '+loc.n,
      summary: `Polizeimeldung vom ${new Date(ts).toLocaleDateString('de-DE')}. Die Einsatzkräfte wurden um ${Math.floor(8+Math.random()*14)}:${String(Math.floor(Math.random()*60)).padStart(2,'0')} Uhr alarmiert. Die Ermittlungen wurden aufgenommen. Zeugen werden gebeten, sich bei der zuständigen Polizeidienststelle zu melden.`,
      category: cat,
      land: loc.land,
      country: loc.country,
      location: loc.n,
      lat: loc.lat+(Math.random()-.5)*.2,
      lng: loc.lng+(Math.random()-.5)*.2,
      date: new Date(ts).toISOString(),
      url: '#',
      source: 'demo-daten.local'
    };
  });
}

// ── PILLS ──
function initCatPills(){
  const present = [...new Set(allData.map(d=>d.category))];
  const wrap = document.getElementById('catPills');
  wrap.innerHTML = '';
  present.forEach(cat => {
    const btn = document.createElement('button');
    btn.className='pill'; btn.textContent=cat;
    btn.onclick = () => toggleCat(cat, btn);
    wrap.appendChild(btn);
  });
}
function toggleCat(cat, btn){
  if(activeFilters.cats.has(cat)){ activeFilters.cats.delete(cat); btn.classList.remove('active'); }
  else { activeFilters.cats.add(cat); btn.classList.add('active'); }
  applyFilters();
}

// ── FILTERS ──
document.getElementById('searchInput').addEventListener('input', e => { activeFilters.search=e.target.value.toLowerCase(); applyFilters(); });
document.getElementById('countryFilter').addEventListener('change', e => { activeFilters.country=e.target.value; applyFilters(); });
document.getElementById('bundeslandFilter').addEventListener('change', e => { activeFilters.bundesland=e.target.value; applyFilters(); });
document.getElementById('zeitFilter').addEventListener('change', e => { activeFilters.tage=e.target.value; applyFilters(); });

function applyFilters(){
  const now = Date.now();
  filtered = allData.filter(d => {
    if(activeFilters.search){
      const hay = [d.title,d.location,d.bundesland,d.summary||''].join(' ').toLowerCase();
      if(!hay.includes(activeFilters.search)) return false;
    }
    if(activeFilters.country && d.country!==activeFilters.country) return false;
    if(activeFilters.bundesland && d.bundesland!==activeFilters.bundesland && d.land!==activeFilters.bundesland) return false;
    if(activeFilters.tage){ const ms=parseInt(activeFilters.tage)*86400000; if(now-new Date(d.date).getTime()>ms) return false; }
    if(activeFilters.cats.size>0 && !activeFilters.cats.has(d.category)) return false;
    return true;
  });

  const display = isRouteMode
    ? routeIncidents.filter(r => filtered.find(f=>f.id===r.id))
    : filtered;

  renderList(display);
  renderMap();
  document.getElementById('sidebarCount').textContent = display.length;
}

// ── LIST ──
function renderList(items){
  const list = document.getElementById('incidentList');
  if(!items || items.length===0){
    list.innerHTML='<div class="empty-state"><p>KEINE VORFÄLLE GEFUNDEN</p></div>';
    return;
  }
  const sorted = [...items].sort((a,b)=>new Date(b.date)-new Date(a.date));
  list.innerHTML = sorted.map(d => {
    const col = CAT_COLORS[d.category]||'#4a5568';
    const dateStr = new Date(d.date).toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'2-digit'});
    const distHtml = d._distKm!=null ? `<div class="route-dist">↔ ${d._distKm.toFixed(1)} km zur Route</div>` : '';
    return `<div class="incident-card${isRouteMode?' route-hl':''}" id="card-${d.id}" style="--cat-color:${col}" onclick="selectIncident(${d.id})">
      <div class="card-top"><span class="card-cat">${d.category}</span><span class="card-date">${dateStr}</span></div>
      <div class="card-title">${d.title}</div>
      <div class="card-loc">📍 ${d.location} · ${d.land||d.bundesland||''} ${d.country ? '('+d.country+')' : ''}</div>
      ${distHtml}
      <div class="card-src">${d.source}</div>
    </div>`;
  }).join('');
}

// ── MAP RENDER ──
function renderMap(){
  if(heatLayer){ map.removeLayer(heatLayer); heatLayer=null; }
  dotsGroup.clearLayers();
  const geo = filtered.filter(d=>d.lat&&d.lng);
  if(currentView==='heat'){
    if(geo.length>0){
      heatLayer = L.heatLayer(geo.map(d=>[d.lat,d.lng,1]),{
        radius:28, blur:20, maxZoom:12,
        gradient:{0.2:'#00e5ff',0.5:'#f5a623',0.8:'#ff3b5c',1:'#fff'}
      }).addTo(map);
    }
  } else {
    geo.forEach(d => {
      const col = CAT_COLORS[d.category]||'#4a5568';
      const icon = L.divIcon({className:'',html:`<div style="width:10px;height:10px;border-radius:50%;background:${col};border:2px solid rgba(255,255,255,.25);box-shadow:0 0 6px ${col}88"></div>`,iconSize:[10,10],iconAnchor:[5,5]});
      L.marker([d.lat,d.lng],{icon})
        .bindPopup(`<div class="popup-cat">${d.category}</div><div class="popup-title">${d.title}</div><div class="popup-loc">${d.location} · ${d.bundesland}</div>`)
        .on('click',()=>selectIncident(d.id))
        .addTo(dotsGroup);
    });
  }
}

function setView(v){
  currentView=v;
  document.getElementById('btnHeat').classList.toggle('active',v==='heat');
  document.getElementById('btnDots').classList.toggle('active',v==='dots');
  renderMap();
}

// ── SELECT ──
function selectIncident(id){
  const d = allData.find(x=>x.id===id);
  if(!d) return;
  if(selectedCard) document.getElementById('card-'+selectedCard)?.classList.remove('active');
  selectedCard = id;
  document.getElementById('card-'+id)?.classList.add('active');
  document.getElementById('card-'+id)?.scrollIntoView({behavior:'smooth',block:'nearest'});
  showDetail(d);
  if(d.lat&&d.lng) map.flyTo([d.lat,d.lng],Math.max(map.getZoom(),13),{duration:.8});
}

        <div style="margin-top:6px;font-size:11px;line-height:1.6;color:var(--muted);border-left:2px solid var(--border);padding-left:8px">${d.summary_original}</div>

// ── MODE TOGGLE ──
function setMode(mode) {
  currentMode = mode;
  document.getElementById('modeRoute').style.display    = mode==='route'    ? '' : 'none';
  document.getElementById('modeStandort').style.display = mode==='standort' ? '' : 'none';
  document.getElementById('tabRoute').classList.toggle('active',    mode==='route');
  document.getElementById('tabStandort').classList.toggle('active', mode==='standort');
}

// ── STANDORT SUCHE ──
document.getElementById('radiusSlider').addEventListener('input', () => {
  const v = document.getElementById('radiusSlider').value;
  document.getElementById('radiusVal').textContent = v+' km';
  if(isRouteMode && currentMode==='standort') applyStandortRadius();
});

async function calcStandort(){
  const txt = document.getElementById('standortInput').value.trim();
  if(!txt){ alert('Bitte einen Standort eingeben.'); return; }
  const spinner = document.getElementById('standortSpinner');
  spinner.classList.add('show');
  document.getElementById('routeInfo').innerHTML = '';
  try {
    const geo = await geocodePlace(txt);
    // Marker + Kreis
    if(standortMarker) map.removeLayer(standortMarker);
    if(standortCircle) map.removeLayer(standortCircle);
    if(routeLayer){ map.removeLayer(routeLayer); routeLayer=null; }
    window._routeCoords = null;

    const radiusKm = parseInt(document.getElementById('radiusSlider').value);
    standortMarker = L.marker([geo.lat, geo.lng], {
      icon: L.divIcon({className:'', html:`<div style="width:14px;height:14px;border-radius:50%;background:#f5a623;border:3px solid #fff;box-shadow:0 0 10px #f5a623"></div>`, iconSize:[14,14], iconAnchor:[7,7]})
    }).addTo(map).bindPopup(`<div class="popup-cat">STANDORT</div><div class="popup-title">${txt}</div><div class="popup-loc">Radius: ${radiusKm} km</div><div class="popup-loc" style="margin-top:3px;font-size:9px;opacity:.6">${geo.displayName?.split(',').slice(0,3).join(',')||''}</div>`).openPopup();

    standortCircle = L.circle([geo.lat, geo.lng], {
      radius: radiusKm * 1000,
      color: '#f5a623', fillColor: '#f5a623', fillOpacity: 0.07, weight: 2, dashArray: '8 4'
    }).addTo(map);

    map.fitBounds(standortCircle.getBounds(), {padding:[40,40]});
    window._standortGeo = {lat: geo.lat, lng: geo.lng};
    isRouteMode = true;

    document.getElementById('routeInfo').innerHTML =
      `Standort: <span>${txt}</span>${geo.displayName?' <span style="opacity:.5;font-size:9px">('+geo.displayName.split(',').slice(0,2).join(',')+')</span>':''} &nbsp;|&nbsp; 📍 Radius: <span>${radiusKm} km</span> &nbsp;|&nbsp; ${routeIncidents.length} Vorfälle`;
    document.getElementById('sidebarTitle').textContent = 'VORFÄLLE IM UMKREIS';
    document.getElementById('sidebarCount').classList.add('route-mode');

    applyStandortRadius();
  } catch(e) {
    alert('Fehler: '+e.message);
  }
  spinner.classList.remove('show');
}

function applyStandortRadius(){
  if(!window._standortGeo) return;
  const {lat, lng} = window._standortGeo;
  const radiusKm = parseInt(document.getElementById('radiusSlider').value);

  // Kreis aktualisieren
  if(standortCircle) standortCircle.setRadius(radiusKm * 1000);

  routeIncidents = allData.filter(d => d.lat && d.lng).map(d => {
    const dist = haversine(lat, lng, d.lat, d.lng);
    return dist <= radiusKm ? {...d, _distKm: dist} : null;
  }).filter(Boolean);
  routeIncidents.sort((a,b)=>a._distKm-b._distKm);
  renderList(routeIncidents);
  document.getElementById('sidebarCount').textContent = routeIncidents.length;
  if(standortCircle) map.fitBounds(standortCircle.getBounds(), {padding:[30,30]});
}

// ── ROUTE PANEL ──
function toggleRoutePanel(){
  document.getElementById('routePanel').classList.toggle('open');
}

document.getElementById('bufferSlider').addEventListener('input', () => {
  const v = document.getElementById('bufferSlider').value;
  document.getElementById('sliderVal').textContent = v+' km';
  if(isRouteMode) applyRouteBuffer();
});

// ── GEOCODE via Nominatim ──
async function geocodePlace(name){
  // Kein countrycodes-Filter – damit funktioniert auch Paris (FR), London, etc.
  const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(name)}&format=json&limit=1&accept-language=de`;
  const res = await fetch(url, {headers:{'User-Agent':'Europa-Polizei-Monitor/2.0'}});
  const data = await res.json();
  if(!data.length) throw new Error('Ort nicht gefunden: '+name);
  return {lat:parseFloat(data[0].lat), lng:parseFloat(data[0].lon), displayName: data[0].display_name};
}

// ── ROUTE via OSRM (kostenlos, kein API-Key) ──
async function calcRoute(){
  const startTxt = document.getElementById('routeStart').value.trim();
  const endTxt   = document.getElementById('routeEnd').value.trim();
  if(!startTxt||!endTxt){ alert('Bitte Start und Ziel eingeben.'); return; }

  const spinner = document.getElementById('routeSpinner');
  spinner.classList.add('show');
  document.getElementById('routeInfo').innerHTML = '';

  try {
    const startGeo = await geocodePlace(startTxt);
    await new Promise(r=>setTimeout(r,1200)); // Nominatim Rate-Limit
    const endGeo   = await geocodePlace(endTxt);

    const osrmUrl = `https://router.project-osrm.org/route/v1/driving/${startGeo.lng},${startGeo.lat};${endGeo.lng},${endGeo.lat}?overview=full&geometries=geojson`;
    const res  = await fetch(osrmUrl);
    const data = await res.json();
    if(!data.routes||!data.routes.length) throw new Error('Keine Route gefunden.');

    const route  = data.routes[0];
    const coords = route.geometry.coordinates.map(c=>[c[1],c[0]]);
    const distKm = (route.distance/1000).toFixed(1);
    const durTotalMin = Math.round(route.duration/60);
    const durH   = Math.floor(durTotalMin/60);
    const durMin = durTotalMin % 60;
    const durStr = durH > 0 ? `${durH}h ${durMin}min` : `${durMin}min`;

    if(routeLayer) map.removeLayer(routeLayer);
    routeLayer = L.polyline(coords,{color:'#f5a623',weight:4,opacity:.85,dashArray:'10 6'}).addTo(map);
    map.fitBounds(routeLayer.getBounds(),{padding:[50,50]});

    window._routeCoords = coords;
    isRouteMode = true;

    document.getElementById('routeInfo').innerHTML =
      `Route: <span>${startTxt}</span> → <span>${endTxt}</span> &nbsp;|&nbsp; 🛣 <span>${distKm} km</span> &nbsp;|&nbsp; ⏱ <span>~${durStr}</span>`;
    document.getElementById('sidebarTitle').textContent = 'VORFÄLLE ENTLANG ROUTE';
    document.getElementById('sidebarCount').classList.add('route-mode');

    applyRouteBuffer();

  } catch(e) {
    alert('Fehler: '+e.message);
  }
  spinner.classList.remove('show');
}

// ── PUFFER FILTER ──
function applyRouteBuffer(){
  if(!window._routeCoords) return;
  const bufKm = parseInt(document.getElementById('bufferSlider').value);
  routeIncidents = [];
  allData.filter(d=>d.lat&&d.lng).forEach(d => {
    const dist = minDistToPolyline(d.lat, d.lng, window._routeCoords);
    if(dist<=bufKm) routeIncidents.push({...d, _distKm:dist});
  });
  routeIncidents.sort((a,b)=>a._distKm-b._distKm);
  renderList(routeIncidents);
  document.getElementById('sidebarCount').textContent = routeIncidents.length;
}

// ── DISTANZ-BERECHNUNG ──
function haversine(lat1,lng1,lat2,lng2){
  const R=6371, dLat=(lat2-lat1)*Math.PI/180, dLng=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function minDistToPolyline(lat,lng,coords){
  let min=Infinity;
  for(let i=0;i<coords.length-1;i++){
    const d=distToSegment(lat,lng,coords[i][0],coords[i][1],coords[i+1][0],coords[i+1][1]);
    if(d<min) min=d;
  }
  return min;
}
function distToSegment(plat,plng,alat,alng,blat,blng){
  const dx=blng-alng, dy=blat-alat, len2=dx*dx+dy*dy;
  if(len2===0) return haversine(plat,plng,alat,alng);
  const t=Math.max(0,Math.min(1,((plng-alng)*dx+(plat-alat)*dy)/len2));
  return haversine(plat,plng,alat+t*dy,alng+t*dx);
}

// ── ROUTE LÖSCHEN ──
function clearRoute(){
  if(routeLayer){ map.removeLayer(routeLayer); routeLayer=null; }
  if(standortMarker){ map.removeLayer(standortMarker); standortMarker=null; }
  if(standortCircle){ map.removeLayer(standortCircle); standortCircle=null; }
  window._routeCoords = null;
  window._standortGeo = null;
  isRouteMode = false;
  routeIncidents = [];
  document.getElementById('routeStart').value   = '';
  document.getElementById('routeEnd').value     = '';
  document.getElementById('standortInput').value = '';
  document.getElementById('routeInfo').innerHTML = '';
  document.getElementById('sidebarTitle').textContent = 'VORFÄLLE';
  document.getElementById('sidebarCount').classList.remove('route-mode');
  applyFilters();
}

// ── STATS ──
function updateStats(){
  const today=new Date(); today.setHours(0,0,0,0);
  document.getElementById('statTotal').textContent   = allData.length;
  document.getElementById('statGeo').textContent     = allData.filter(d=>d.lat&&d.lng).length;
  document.getElementById('statSources').textContent = new Set(allData.map(d=>d.source)).size;
  document.getElementById('statToday').textContent   = allData.filter(d=>new Date(d.date)>=today).length;
  const dates = allData.map(d=>new Date(d.date));
  const maxDate = dates.length ? new Date(Math.max(...dates)) : null;
  document.getElementById('lastUpdate').textContent = maxDate
    ? 'Stand: '+maxDate.toLocaleString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'})
    : '';
}

// ── EXCEL ──
function exportExcel(){
  const src = isRouteMode ? routeIncidents : filtered;
  const rows = src.map(d=>({
    Datum: new Date(d.date).toLocaleDateString('de-DE'),
    Kategorie: d.category, Titel: d.title,
    Ort: d.location, Bundesland: d.bundesland,
    'Distanz Route (km)': d._distKm!=null ? d._distKm.toFixed(1) : '',
    Quelle: d.source, URL: d.url,
    Zusammenfassung: d.summary||''
  }));
  const ws=XLSX.utils.json_to_sheet(rows);
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'Vorfälle');
  XLSX.writeFile(wb,'polizei-monitor-de_'+new Date().toISOString().slice(0,10)+'.xlsx');
}
