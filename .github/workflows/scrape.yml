name: Scrape DE Polizei Monitor

on:
  schedule:
    - cron: "0 7 * * *"   # täglich 07:00 UTC
  workflow_dispatch:        # manuell auslösbar

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python Setup
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Abhängigkeiten installieren
        run: pip install requests beautifulsoup4 lxml

      - name: Scraper ausführen
        run: python scraper.py

      - name: Daten committen und pushen
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/incidents.json data/geo_cache.json || true
          git diff --cached --quiet || git commit -m "chore: update incidents $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
