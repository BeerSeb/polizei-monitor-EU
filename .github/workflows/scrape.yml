name: Scrape Europa Polizei Monitor

on:
  schedule:
    #  07:00 CET  = 06:00 UTC (Winterzeit)
    #  07:00 CEST = 05:00 UTC (Sommerzeit)
    #  Wir nutzen 05:00 UTC → läuft immer spätestens um 07:00 CET
    - cron: "0 5 * * *"
  workflow_dispatch:   # manuell auslösbar

permissions:
  contents: write
  pages: write
  id-token: write

# Nur ein gleichzeitiger Deploy
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ── JOB 1: Scrapen & Daten committen ──────────────────────────────────────
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python Setup
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Abhängigkeiten installieren
        run: pip install requests beautifulsoup4 lxml

      - name: Scraper ausführen
        run: python scraper.py

      - name: Daten committen und pushen
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/incidents.json data/geo_cache.json || true
          git diff --cached --quiet || git commit -m "chore: update incidents $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push

  # ── JOB 2: GitHub Pages neu deployen ──────────────────────────────────────
  deploy:
    needs: scrape          # läuft erst nach erfolgreichem Scrape
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout (mit frischen Daten)
        uses: actions/checkout@v4
        with:
          ref: main        # holt den soeben gepushten Commit

      - name: GitHub Pages Setup
        uses: actions/configure-pages@v5

      - name: Artefakt hochladen
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."        # gesamtes Repo-Root (index.html + data/)

      - name: Seite deployen
        id: deployment
        uses: actions/deploy-pages@v4
