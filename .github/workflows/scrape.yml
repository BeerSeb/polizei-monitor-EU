name: Scrape Deutschland Polizei Monitor

on:
  schedule:
    - cron: "0 5 * * *"   # 07:00 CET / 06:00 CEST
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python Setup
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Abhängigkeiten installieren
        run: pip install requests beautifulsoup4 lxml

      - name: Scraper ausführen
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scraper.py

      - name: Incidents-Anzahl prüfen
        run: |
          if [ -f data/incidents.json ]; then
            COUNT=$(python3 -c "import json; d=json.load(open('data/incidents.json')); print(len(d))")
            echo "✓ incidents.json enthält $COUNT Einträge"
          else
            echo "✗ data/incidents.json wurde NICHT erstellt!"
            exit 1
          fi

      - name: Daten committen und pushen
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/incidents.json data/geo_cache.json data/translation_cache.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "Keine Änderungen – kein Commit nötig"
          else
            git commit -m "chore: update incidents $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi

  deploy:
    needs: scrape
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout (mit frischen Daten)
        uses: actions/checkout@v4
        with:
          ref: main

      - name: GitHub Pages Setup
        uses: actions/configure-pages@v5

      - name: Artefakt hochladen
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Seite deployen
        id: deployment
        uses: actions/deploy-pages@v4
